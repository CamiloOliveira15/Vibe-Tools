<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe - Standalone</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --brand: #4f46e5;
      --brand-soft: rgba(79, 70, 229, 0.14);
      --pill: #f1f5f9;
      --pill-active: #0f172a;
      --pill-text-active: #f8fafc;
      --shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
    }

    body.dark {
      --bg: #0a0a0c;
      --card: #17181c;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --line: #2a2b30;
      --brand: #6366f1;
      --brand-soft: rgba(99, 102, 241, 0.18);
      --pill: #1f2025;
      --pill-active: #f4f4f5;
      --pill-text-active: #0a0a0c;
      --shadow: 0 14px 35px rgba(0, 0, 0, 0.38);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(1200px 560px at -8% -20%, rgba(99, 102, 241, 0.24), transparent 60%),
        radial-gradient(900px 540px at 120% -20%, rgba(34, 197, 94, 0.14), transparent 60%),
        var(--bg);
      font-family: "Segoe UI Variable", "Trebuchet MS", "Candara", "Verdana", sans-serif;
      min-height: 100vh;
    }

    .wrap {
      width: min(1200px, 94vw);
      margin: 0 auto;
      padding-bottom: 32px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
      background: color-mix(in oklab, var(--bg) 88%, transparent);
    }

    .topgrid {
      display: grid;
      grid-template-columns: 1fr minmax(240px, 560px) auto;
      gap: 12px;
      align-items: center;
      padding: 14px 0;
    }

    h1 {
      margin: 0;
      font-size: 1.28rem;
      letter-spacing: 0.1px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: linear-gradient(140deg, var(--brand), #22d3ee);
      box-shadow: 0 0 0 4px var(--brand-soft);
    }

    .search {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 12px;
      padding: 0 12px;
      min-height: 44px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .search input {
      border: 0;
      outline: 0;
      width: 100%;
      background: transparent;
      color: var(--text);
      font-size: 0.95rem;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button, select {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      border-radius: 12px;
      padding: 8px 11px;
      font: inherit;
      cursor: pointer;
      transition: all 0.16s ease;
    }

    button:hover, select:hover {
      filter: brightness(1.02);
      border-color: color-mix(in oklab, var(--brand) 40%, var(--line));
    }

    .btn-brand {
      background: linear-gradient(120deg, var(--brand), #4f46e5);
      color: #fff;
      border-color: color-mix(in oklab, var(--brand) 60%, #000);
      box-shadow: 0 8px 18px color-mix(in oklab, var(--brand) 30%, transparent);
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 8px 0 14px;
    }

    .pill {
      border-radius: 999px;
      background: var(--pill);
      border: 1px solid var(--line);
      color: var(--muted);
      padding: 6px 12px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .pill.active {
      background: var(--pill-active);
      color: var(--pill-text-active);
      border-color: transparent;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 20px 0 14px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 10px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: color-mix(in oklab, var(--brand) 35%, var(--line));
      box-shadow: 0 20px 34px rgba(15, 23, 42, 0.2);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .badge {
      display: inline-flex;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      border: 1px solid var(--line);
      background: color-mix(in oklab, var(--brand) 12%, transparent);
    }

    .badge-prompt { color: #10b981; border-color: rgba(16, 185, 129, 0.25); background: rgba(16, 185, 129, 0.12); }
    .badge-skill { color: #e879f9; border-color: rgba(232, 121, 249, 0.25); background: rgba(232, 121, 249, 0.12); }
    .badge-snippet { color: #22d3ee; border-color: rgba(34, 211, 238, 0.25); background: rgba(34, 211, 238, 0.12); }
    .badge-workflow { color: #f59e0b; border-color: rgba(245, 158, 11, 0.25); background: rgba(245, 158, 11, 0.12); }

    .icon-btn {
      width: 33px;
      height: 33px;
      display: inline-grid;
      place-items: center;
      padding: 0;
      border-radius: 10px;
    }

    .card h3 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.35;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-size: 0.75rem;
      border: 1px dashed var(--line);
      padding: 4px 8px;
      border-radius: 999px;
      color: var(--muted);
      background: color-mix(in oklab, var(--card) 90%, #fff);
    }

    .empty {
      text-align: center;
      border: 1px dashed var(--line);
      background: var(--card);
      border-radius: 16px;
      padding: 32px 16px;
      color: var(--muted);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(3, 9, 20, 0.68);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 20;
    }

    .modal.open { display: flex; }

    .panel {
      width: min(940px, 95vw);
      max-height: 90vh;
      overflow: auto;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: var(--card);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .panel pre {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      border: 1px solid var(--line);
      background: color-mix(in oklab, var(--card) 90%, #000 2%);
      border-radius: 14px;
      padding: 14px;
      margin: 0;
      font-size: 0.86rem;
      line-height: 1.55;
    }

    .muted { color: var(--muted); }

    @media (max-width: 900px) {
      .topgrid { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
      .meta-row { flex-direction: column; align-items: flex-start; gap: 8px; }
      .row.stack-sm { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body class="dark">
  <header class="topbar">
    <div class="wrap">
      <div class="topgrid">
        <h1><span class="dot"></span> Vibe</h1>
        <label class="search" aria-label="Busca">
          <span>Pesquisar</span>
          <input id="search" type="text" placeholder="Prompt, skill, snippet, tag..." />
        </label>
        <div class="actions">
          <button id="onlyFav">Somente favoritos</button>
          <button id="exportJson">Exportar JSON</button>
          <button id="toggleTheme">Tema</button>
          <button id="clearFilters">Limpar filtros</button>
        </div>
      </div>

      <div class="filters" id="typeFilters"></div>
      <div class="filters">
        <label for="category">Categoria:</label>
        <select id="category"></select>
        <label for="tagFilter">Tag:</label>
        <select id="tagFilter"></select>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="meta-row">
      <span id="resultCount"></span>
      <span class="muted">Standalone local: sem Node e sem build</span>
    </div>
    <section id="grid" class="grid"></section>
    <section id="empty" class="empty" hidden>Nenhum item encontrado com os filtros atuais.</section>
  </main>

  <div id="modal" class="modal" role="dialog" aria-modal="true">
    <article class="panel">
      <div class="row stack-sm" style="margin-bottom: 12px;">
        <strong id="mTitle"></strong>
        <div class="row">
          <button id="copyContent" class="btn-brand">Copiar conteudo</button>
          <button id="toggleFav">Favoritar</button>
          <button id="closeModal">Fechar</button>
        </div>
      </div>
      <p id="mDesc" class="muted"></p>
      <div id="mMeta" class="muted" style="margin: 10px 0;"></div>
      <div id="mTags" class="tags" style="margin-bottom: 12px;"></div>
      <pre id="mContent"></pre>
    </article>
  </div>

  <script>
    const DATA = [
      {
        id: 1,
        title: "Persona: Engenheiro de Software Staff/Principal",
        type: "Prompt",
        category: "Comportamento",
        description: "Configura a IA para atuar como Staff/Principal Software Engineer, com foco em arquitetura, seguranca e codigo production-ready.",
        content: "Assuma o papel de um Staff/Principal Software Engineer.\n\nRegras:\n1) Comunicacao direta.\n2) Trade-offs em cada decisao.\n3) Codigo production-ready com tipagem e validacao.",
        tags: ["system-prompt", "arquitetura", "clean-code"],
        author: "DevMaster99",
        stats: { uses: 8205 },
      },
      {
        id: 2,
        title: "Snippet: Arquivo .cursorrules Master",
        type: "Snippet",
        category: "Tooling",
        description: "Regras definitivas para usar na raiz do projeto e melhorar qualidade de codigo gerado.",
        content: "# CURSOR AI RULES\n\n- Nao use any\n- Prefira imutabilidade\n- Nunca deixar blocos incompletos",
        tags: ["cursor", "tooling", "regras"],
        author: "VibeCoder",
        stats: { uses: 13400 },
      },
      {
        id: 3,
        title: "Skill: Code Reviewer de Elite",
        type: "Skill",
        category: "Revisao",
        description: "Pipeline de revisao com foco em OWASP, performance e clean code.",
        content: "Checklist:\n- Seguranca (OWASP Top 10)\n- Complexidade e gargalos\n- Sugestoes de refactor\n- Codigo final pronto para uso",
        tags: ["code-review", "owasp", "performance"],
        author: "SecOps_Alice",
        stats: { uses: 1432 },
      },
      {
        id: 4,
        title: "Workflow: Agente ReAct LangGraph",
        type: "Workflow",
        category: "Agentes AI",
        description: "Setup inicial para agente ciclico ReAct com LangGraph.",
        content: "from langgraph.graph import StateGraph, START\n\nworkflow = StateGraph(AgentState)\nworkflow.add_node('agent', call_model)\napp = workflow.compile()",
        tags: ["langgraph", "python", "agentes"],
        author: "AI_Architect",
        stats: { uses: 5120 },
      },
      {
        id: 5,
        title: "Snippet: Middleware Auth Next.js",
        type: "Snippet",
        category: "Backend",
        description: "Middleware robusto para proteger rotas no Next.js App Router.",
        content: "export function middleware(request) {\n  const token = request.cookies.get('auth_token')?.value;\n  if (!token) return NextResponse.redirect(new URL('/login', request.url));\n  return NextResponse.next();\n}",
        tags: ["nextjs", "middleware", "auth"],
        author: "NextJS_Guru",
        stats: { uses: 15400 },
      },
      {
        id: 6,
        title: "Prompt: Mestre em Pandas",
        type: "Prompt",
        category: "Data Science",
        description: "Prompt para gerar codigo Pandas vetorizado e eficiente.",
        content: "Regras de ouro:\n1) Evitar loops\n2) Otimizar memoria\n3) Method chaining\n4) Explicar por que a solucao e mais rapida",
        tags: ["python", "pandas", "otimizacao"],
        author: "DataWrangler",
        stats: { uses: 6120 },
      }
    ];

    const state = {
      search: "",
      type: "Todos",
      category: "Todas",
      tag: "Todas",
      onlyFav: false,
      currentId: null,
      dark: true,
      favorites: JSON.parse(localStorage.getItem("vibe.favs") || "[]"),
    };

    const types = ["Todos", ...new Set(DATA.map(x => x.type))];
    const categories = ["Todas", ...new Set(DATA.map(x => x.category))];
    const tags = ["Todas", ...new Set(DATA.flatMap(x => x.tags))].sort();

    const grid = document.getElementById("grid");
    const empty = document.getElementById("empty");
    const resultCount = document.getElementById("resultCount");

    const typeFilters = document.getElementById("typeFilters");
    types.forEach(t => {
      const b = document.createElement("button");
      b.className = "pill";
      b.textContent = t;
      b.onclick = () => { state.type = t; render(); };
      typeFilters.appendChild(b);
    });

    function fillSelect(id, options) {
      const sel = document.getElementById(id);
      sel.innerHTML = options.map(o => `<option value="${o}">${o}</option>`).join("");
      sel.onchange = () => { state[id === "category" ? "category" : "tag"] = sel.value; render(); };
    }

    fillSelect("category", categories);
    fillSelect("tagFilter", tags);

    document.getElementById("search").oninput = (e) => { state.search = e.target.value.trim().toLowerCase(); render(); };
    document.getElementById("onlyFav").onclick = () => { state.onlyFav = !state.onlyFav; render(); };
    document.getElementById("toggleTheme").onclick = () => {
      state.dark = !state.dark;
      document.body.classList.toggle("dark", state.dark);
    };

    document.getElementById("clearFilters").onclick = () => {
      state.search = "";
      state.type = "Todos";
      state.category = "Todas";
      state.tag = "Todas";
      state.onlyFav = false;
      document.getElementById("search").value = "";
      document.getElementById("category").value = "Todas";
      document.getElementById("tagFilter").value = "Todas";
      render();
    };

    document.getElementById("exportJson").onclick = () => {
      const filtered = getFiltered();
      const blob = new Blob([JSON.stringify(filtered, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "vibe-tools-standalone.json";
      a.click();
      URL.revokeObjectURL(url);
    };

    function getFiltered() {
      return DATA.filter(item => {
        const text = (item.title + " " + item.description + " " + item.tags.join(" ")).toLowerCase();
        const okSearch = !state.search || text.includes(state.search);
        const okType = state.type === "Todos" || item.type === state.type;
        const okCategory = state.category === "Todas" || item.category === state.category;
        const okTag = state.tag === "Todas" || item.tags.includes(state.tag);
        const okFav = !state.onlyFav || state.favorites.includes(item.id);
        return okSearch && okType && okCategory && okTag && okFav;
      });
    }

    function render() {
      const filtered = getFiltered();
      grid.innerHTML = "";

      [...typeFilters.children].forEach(b => b.classList.toggle("active", b.textContent === state.type));
      document.getElementById("onlyFav").classList.toggle("btn-brand", state.onlyFav);

      resultCount.textContent = `${filtered.length} item(ns) exibidos`;

      if (!filtered.length) {
        empty.hidden = false;
        return;
      }
      empty.hidden = true;

      filtered.forEach(item => {
        const fav = state.favorites.includes(item.id);
        const badgeClass = `badge-${String(item.type || "").toLowerCase()}`;
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <div class="row">
            <span class="badge ${badgeClass}">${item.type}</span>
            <button data-fav="${item.id}" class="icon-btn" title="Favoritar">${fav ? "★" : "☆"}</button>
          </div>
          <h3>${escapeHtml(item.title)}</h3>
          <p class="desc">${escapeHtml(item.description)}</p>
          <div class="row muted" style="font-size:0.8rem;">
            <span>${escapeHtml(item.category)}</span>
            <span>${item.stats?.uses || 0} usos</span>
          </div>
          <div class="tags">${item.tags.map(t => `<span class="tag">#${escapeHtml(t)}</span>`).join("")}</div>
        `;

        card.onclick = (e) => {
          const favBtn = e.target.closest("button[data-fav]");
          if (favBtn) {
            toggleFavorite(Number(favBtn.dataset.fav));
            return;
          }
          openModal(item.id);
        };
        grid.appendChild(card);
      });
    }

    function toggleFavorite(id) {
      state.favorites = state.favorites.includes(id)
        ? state.favorites.filter(x => x !== id)
        : [...state.favorites, id];
      localStorage.setItem("vibe.favs", JSON.stringify(state.favorites));
      render();
      if (state.currentId === id) syncModalFavButton();
    }

    const modal = document.getElementById("modal");
    const mTitle = document.getElementById("mTitle");
    const mDesc = document.getElementById("mDesc");
    const mMeta = document.getElementById("mMeta");
    const mTags = document.getElementById("mTags");
    const mContent = document.getElementById("mContent");

    function openModal(id) {
      const item = DATA.find(x => x.id === id);
      if (!item) return;
      state.currentId = id;
      mTitle.textContent = item.title;
      mDesc.textContent = item.description;
      mMeta.textContent = `${item.type} | ${item.category} | Autor: ${item.author || "Anonimo"} | ${item.stats?.uses || 0} usos`;
      mTags.innerHTML = item.tags.map(t => `<span class="tag">#${escapeHtml(t)}</span>`).join("");
      mContent.textContent = item.content;
      syncModalFavButton();
      modal.classList.add("open");
    }

    function syncModalFavButton() {
      const btn = document.getElementById("toggleFav");
      if (!state.currentId) return;
      const fav = state.favorites.includes(state.currentId);
      btn.textContent = fav ? "Remover favorito" : "Favoritar";
      btn.classList.toggle("btn-brand", fav);
    }

    document.getElementById("closeModal").onclick = () => modal.classList.remove("open");
    modal.onclick = (e) => { if (e.target === modal) modal.classList.remove("open"); };

    document.getElementById("toggleFav").onclick = () => {
      if (!state.currentId) return;
      toggleFavorite(state.currentId);
    };

    document.getElementById("copyContent").onclick = async () => {
      if (!state.currentId) return;
      const item = DATA.find(x => x.id === state.currentId);
      if (!item) return;
      try {
        await navigator.clipboard.writeText(item.content);
        const btn = document.getElementById("copyContent");
        const old = btn.textContent;
        btn.textContent = "Copiado";
        setTimeout(() => { btn.textContent = old; }, 1400);
      } catch {
        alert("Nao foi possivel copiar automaticamente neste navegador.");
      }
    };

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    render();
  </script>
</body>
</html>
